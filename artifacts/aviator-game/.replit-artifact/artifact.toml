kind = "web"
previewPath = "/"
title = "Aviator Game"
version = "1.0.0"
id = "artifacts/aviator-game"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21308

[services.development]
run = "pnpm --filter @workspace/aviator-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aviator-game", "run", "build" ]
serve = "static"
publicDir = "artifacts/aviator-game/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21308"
BASE_PATH = "/"
